server {
    listen 80;
    server_name _;

    # Enable Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    # Serve static assets directly where possible
    location /_next/static {
        proxy_cache VALID_CACHE;
        proxy_pass http://app:3000;
        
        # For testing, you might want to use localhost if running PM2 instead of Docker
        # proxy_pass http://127.0.0.1:3000;
        
        # Cache static files
        expires 365d;
        access_log off;
    }

    # Proxy all other requests to the Next.js app
    location / {
        proxy_pass http://app:3000;
        # proxy_pass http://127.0.0.1:3000; # Use this if PM2/cPanel deployment
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real IPs
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
